version: 2

models:
  - name: dim_products
    description: >
      Static product catalogue. Grain: one row per product_id. No versioning.
    columns:
      - name: product_id
        tests: [unique, not_null]
      - name: product_type
        tests:
          - not_null
          - accepted_values:
              values: ['CORE', 'ADD_ON', 'MARKETPLACE']
      - name: base_mrr_usd
        tests: [not_null]

  - name: dim_api_keys
    description: >
      API key assignments with light SCD2. Grain: one row per (api_key_id, assigned_at).
      NOT unique on api_key_id — six keys have two rows due to mid-period reassignment.
      revoked_at_effective uses 9999-12-31 sentinel for active keys.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [api_key_id, assigned_at]
    columns:
      - name: api_key_id
        tests: [not_null]
      - name: account_id
        tests: [not_null]
      - name: assigned_at
        tests: [not_null]
      - name: revoked_at_effective
        description: COALESCE(revoked_at, '9999-12-31'). Always non-null.
        tests: [not_null]
      - name: is_reassigned
        tests: [not_null]

  - name: bridge_account_products
    description: >
      Time-ranged many-to-many bridge between accounts and products.
      Grain: one row per (account_id, product_id, effective_from).
      account_key is NOT resolved at build time — a product assignment can span
      multiple SCD2 account versions; fact queries align the bridge range with
      dim_accounts at query time using the event date.
      effective_to_effective uses 9999-12-31 for active assignments.
      discount_pct and is_bundled are relationship-level attributes.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [account_id, product_id, effective_from]
    columns:
      - name: bridge_id
        tests: [unique, not_null]
      - name: account_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: effective_from
        tests: [not_null]
      - name: effective_to_effective
        description: COALESCE(effective_to, '9999-12-31'). Always non-null.
        tests: [not_null]
      - name: is_active
        tests: [not_null]

  - name: dim_fx_rates
    description: >
      Daily USD conversion factors. Grain: one row per (currency, rate_date).
      No USD row — USD facts need no lookup. Three deliberate gaps (GBP 2022-08-29,
      EUR 2023-03-14, GBP 2024-01-02) are preserved; semantic view handles them.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [currency, rate_date]
    columns:
      - name: currency
        tests:
          - not_null
          - accepted_values:
              values: ['GBP', 'EUR']
      - name: rate_date
        tests: [not_null]
      - name: rate
        tests: [not_null]

  - name: dim_accounts
    description: >
      SCD2 account dimension. Grain: one row per account_key (surrogate).
      valid_to_effective uses 9999-12-31 sentinel for current rows to simplify
      range-join syntax in facts. parent_account_id is NULL for root accounts
      and for the four accounts with deliberately missing parents — Unknown
      member strategy is handled in the semantic view layer.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [account_id, valid_from]
    columns:
      - name: account_key
        description: SCD2 surrogate key (integer sequence, unique per version).
        tests: [unique, not_null]
      - name: account_id
        description: Business key, stable across all SCD2 versions.
        tests: [not_null]
      - name: segment
        tests:
          - not_null
          - accepted_values:
              values: ['SMB', 'Mid-Market', 'Enterprise']
      - name: contract_currency
        tests:
          - not_null
          - accepted_values:
              values: ['USD', 'GBP', 'EUR']
      - name: valid_from
        tests: [not_null]
      - name: valid_to_effective
        description: >
          COALESCE(valid_to, '9999-12-31'). Always non-null. Use this column
          for BETWEEN range joins rather than valid_to.
        tests: [not_null]
      - name: is_current
        tests: [not_null]
      - name: is_backdated
        description: >
          TRUE when loaded_at > source_updated_at. Flags the three accounts
          (ACC-0005, ACC-0012, ACC-0023) where the SCD2 change event was
          logged 2 days after the effective date — deliberate messiness.
        tests: [not_null]

  - name: fact_subscriptions
    description: >
      Monthly recurring subscription revenue. Grain: one row per subscription_id
      (account_id + product_id + billing_month).
      account_key is the SCD2 surrogate resolved at build time — links to the
      dim_accounts version active during billing_month, enabling historical
      segment attribution (as-reported) vs current-view in the semantic layer.
      mrr_amount is in contract_currency; FX conversion is the semantic view's job.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [account_id, product_id, billing_month]
    columns:
      - name: subscription_id
        tests: [unique, not_null]
      - name: account_id
        tests: [not_null]
      - name: account_key
        description: SCD2 surrogate — dim_accounts version active at billing_month.
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: billing_month
        tests: [not_null]
      - name: mrr_amount
        tests: [not_null]
      - name: arr_amount
        tests: [not_null]
      - name: currency
        tests:
          - not_null
          - accepted_values:
              values: ['USD', 'GBP', 'EUR']

  - name: fact_services_milestones
    description: >
      Professional services milestone revenue events. Grain: one row per milestone_id.
      No fixed calendar grain — completed_date is irregular.
      account_key resolved at build time via most-recent-version join on completed_date.
      A NULL account_key here is a hard data error (unlike fact_usage_daily where
      post-churn usage is an expected edge case).
      revenue_amount stored in contract_currency; FX conversion in semantic view.
    columns:
      - name: milestone_id
        tests: [unique, not_null]
      - name: account_id
        tests: [not_null]
      - name: account_key
        description: SCD2 surrogate — dim_accounts version active on completed_date.
        tests: [not_null]
      - name: completed_date
        tests: [not_null]
      - name: revenue_amount
        tests: [not_null]
      - name: currency
        tests:
          - not_null
          - accepted_values:
              values: ['USD', 'GBP', 'EUR']

  - name: fact_usage_daily
    description: >
      Daily API consumption at API-key + day grain — the finest grain in the project.
      account_id reflects the account that held the key on usage_date (not current).
      account_key is the SCD2 surrogate from dim_accounts active on usage_date.
      daily_amount = units_consumed * unit_rate, in contract_currency.
      is_reassigned flags usage rows from the 6 keys reassigned mid-period,
      making the conformance problem visible in the mart.
      Conformance integrity guarded by tests/assert_usage_account_matches_key_assignment.sql.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [api_key_id, usage_date]
    columns:
      - name: usage_id
        tests: [unique, not_null]
      - name: api_key_id
        tests: [not_null]
      - name: account_id
        tests: [not_null]
      - name: account_key
        description: SCD2 surrogate — dim_accounts version active on usage_date.
        tests: [not_null]
      - name: usage_date
        tests: [not_null]
      - name: units_consumed
        tests: [not_null]
      - name: daily_amount
        tests: [not_null]
      - name: currency
        tests:
          - not_null
          - accepted_values:
              values: ['USD', 'GBP', 'EUR']
